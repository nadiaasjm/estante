<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Estante — Irmã Nádia</title>
<meta name="description" content="Livros que me marcaram minha vida e links para você encontrar.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple-50: #EEEDFE;
    --purple-200: #AFA9EC;
    --purple-600: #534AB7;
    --purple-800: #3C3489;
    --purple-900: #26215C;
    --coral-50: #FAECE7;
    --coral-600: #993C1D;
    --teal-50: #E1F5EE;
    --teal-600: #0F6E56;
    --amber-50: #FAEEDA;
    --amber-600: #854F0B;
    --gray-100: #F5F4F0;
    --gray-200: #E8E6E0;
    --gray-400: #A8A59C;
    --gray-700: #5C5A55;
    --gray-900: #1C1B18;
    --text: #1C1B18;
    --text-soft: #5C5A55;
    --text-faint: #A8A59C;
    --bg: #FAFAF8;
    --bg-card: #FFFFFF;
    --border: #E8E6E0;
    --border-hover: #C8C5BD;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --serif: 'Lora', Georgia, serif;
    --sans: 'Inter', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 3rem;
  }

  .hero {
    text-align: center;
    padding: 3rem 1.5rem 2rem;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--purple-600), var(--purple-200), var(--coral-600));
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--purple-600);
    font-weight: 500;
    margin-bottom: 10px;
  }
  .hero-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 10px;
  }
  .hero-title em { font-style: italic; color: var(--purple-800); }
  .hero-sub {
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.6;
    max-width: 320px;
    margin: 0 auto;
  }
  .hero-ig {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-faint);
    text-decoration: none;
  }
  .hero-ig:hover { color: var(--purple-600); }

  .cat-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 1.25rem;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .cat-bar::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-soft);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .cat-btn.active {
    background: var(--purple-800);
    border-color: var(--purple-800);
    color: var(--purple-50);
    font-weight: 500;
  }

  .books-list {
    padding: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 480px;
    margin: 0 auto;
  }

  .book-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
    cursor: pointer;
  }
  .book-card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .book-top {
    display: flex;
    gap: 14px;
    padding: 16px;
  }

  /* ── CAPA REAL ── */
  .book-cover {
    width: 68px;
    min-width: 68px;
    height: 96px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    position: relative;
    background: var(--gray-100);
    flex-shrink: 0;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.12);
  }
  .book-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Fallback quando a imagem não carrega */
  .book-cover-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--serif);
    font-size: 9px;
    font-style: italic;
    text-align: center;
    padding: 6px;
    color: var(--text-soft);
    background: var(--purple-50);
    line-height: 1.3;
    z-index: 0;
  }
  .book-cover img { position: relative; z-index: 1; }

  .book-meta { flex: 1; min-width: 0; }
  .book-cat-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--purple-600);
    background: var(--purple-50);
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 7px;
  }
  .tag-literatura { color: var(--coral-600); background: var(--coral-50); }

  .book-title {
    font-family: var(--serif);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 3px;
  }
  .book-author {
    font-size: 12px;
    color: var(--text-faint);
    margin-bottom: 9px;
  }
  .book-stars { color: #C8830A; font-size: 12px; margin-bottom: 8px; }
  .book-teaser {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-faint);
  }
  .book-toggle svg {
    width: 14px; height: 14px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .book-toggle.open svg { transform: rotate(180deg); }

  .book-detail {
    display: none;
    padding: 0 16px 16px;
  }
  .book-detail.open {
    display: block;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .detail-divider { border: none; border-top: 1px solid var(--border); margin: 0 0 16px; }

  .detail-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .detail-experience {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--text-soft);
    line-height: 1.7;
    border-left: 2px solid var(--purple-200);
    padding-left: 12px;
    margin-bottom: 18px;
  }

  .coupon-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--gray-100);
    border: 1px dashed var(--border-hover);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    margin-bottom: 12px;
    gap: 8px;
  }
  .coupon-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin-bottom: 2px;
  }
  .coupon-code {
    font-family: 'Courier New', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--purple-800);
    letter-spacing: 0.12em;
  }
  .copy-btn {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    color: var(--purple-600);
    background: var(--bg-card);
    border: 1px solid var(--purple-200);
    border-radius: var(--radius-sm);
    padding: 5px 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .copy-btn:hover { background: var(--purple-50); }
  .copy-btn.copied { color: var(--teal-600); border-color: var(--teal-600); }

  .buy-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    background: var(--purple-800);
    color: var(--purple-50);
    border: none;
    border-radius: var(--radius-md);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .buy-btn:hover { background: var(--purple-900); }
  .buy-btn svg { width: 15px; height: 15px; opacity: 0.8; flex-shrink: 0; }

  .page-footer {
    text-align: center;
    padding: 2rem 1.5rem 1rem;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gray-900);
    color: #fff;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (prefers-reduced-motion: reduce) {
    *, .book-detail { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<header class="hero">
  <p class="hero-eyebrow">Irmã Nádia</p>
  <h1 class="hero-title">Minha <em>estante</em></h1>
  <p class="hero-sub">Livros que me marcaram — com minha experiência e o link para você encontrar.</p>
  <a class="hero-ig" href="https://instagram.com/@irmanadia.asjm" target="_blank" rel="noopener">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    @SEU_ARROBA_AQUI
  </a>
</header>

<nav class="cat-bar" aria-label="Categorias">
  <button class="cat-btn active" data-cat="todos">Todos</button>
  <button class="cat-btn" data-cat="espiritualidade">Espiritualidade</button>
  <button class="cat-btn" data-cat="literatura">Literatura clássica</button>
</nav>

<main class="books-list" id="books-list" aria-label="Lista de livros"></main>

<footer class="page-footer">
  <p>Alguns links são de afiliadas — quando você compra com meu cupom, uma parte reverte para mim comprar mais livros. 📚<br>Só indico o que li e amei de verdade.</p>
</footer>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="livros.js"></script>
<script>
  const ESTRELAS = ['', '★', '★★', '★★★', '★★★★', '★★★★★'];
  let activeCat = 'todos';
  let openId = null;

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function copyCode(cupom, btn) {
    navigator.clipboard.writeText(cupom).then(() => {
      btn.textContent = 'copiado!';
      btn.classList.add('copied');
      showToast('Cupom ' + cupom + ' copiado!');
      setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('copied'); }, 2200);
    }).catch(() => showToast('Copie: ' + cupom));
  }

  function toggleBook(id) {
    openId = (openId === id) ? null : id;
    render();
    if (openId !== null) {
      setTimeout(() => {
        const el = document.querySelector('[data-id="' + id + '"]');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }
  }

  function buildCard(b, idx) {
    const isOpen = openId === idx;
    const tagClass = b.categoria === 'literatura' ? 'tag-literatura' : '';
    const catLabel = b.categoria === 'literatura' ? 'Literatura clássica' : 'Espiritualidade';
    const stars = ESTRELAS[Math.min(5, Math.max(0, b.estrelas || 5))];

    return `
<article class="book-card" data-id="${idx}">
  <div class="book-top" onclick="toggleBook(${idx})" role="button" tabindex="0"
       aria-expanded="${isOpen}" aria-label="${b.titulo} por ${b.autor}">
    <div class="book-cover">
      <div class="book-cover-fallback">${b.titulo}</div>
      <img src="${b.capa}" alt="Capa de ${b.titulo}"
           onerror="this.style.display='none'">
    </div>
    <div class="book-meta">
      <span class="book-cat-tag ${tagClass}">${catLabel}</span>
      <h2 class="book-title">${b.titulo}</h2>
      <p class="book-author">${b.autor}</p>
      <p class="book-stars">${stars}</p>
      <p class="book-teaser">${b.resumo}</p>
    </div>
  </div>

  <div class="book-toggle ${isOpen ? 'open' : ''}" onclick="toggleBook(${idx})">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
    ${isOpen ? 'fechar' : 'ver minha experiência'}
  </div>

  <div class="book-detail ${isOpen ? 'open' : ''}" aria-hidden="${!isOpen}">
    <hr class="detail-divider">
    <p class="detail-label">Minha experiência</p>
    <blockquote class="detail-experience">${b.minhaExperiencia}</blockquote>
    <p class="detail-label">${b.editora}</p>
    <div class="coupon-row">
      <div>
        <p class="coupon-label">Cupom de desconto</p>
        <p class="coupon-code">${b.cupom}</p>
      </div>
      <button class="copy-btn"
        onclick="event.stopPropagation(); copyCode('${b.cupom}', this)"
        aria-label="Copiar cupom ${b.cupom}">copiar</button>
    </div>
    <a class="buy-btn" href="${b.linkCompra}" target="_blank" rel="noopener"
       onclick="event.stopPropagation()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      encontrar este livro
    </a>
  </div>
</article>`;
  }

  function render() {
    const filtered = activeCat === 'todos'
      ? LIVROS
      : LIVROS.filter(b => b.categoria === activeCat);

    document.getElementById('books-list').innerHTML = filtered.map((b, i) => {
      const realIdx = LIVROS.indexOf(b);
      return buildCard(b, realIdx);
    }).join('');

    document.querySelectorAll('[role="button"]').forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
      });
    });
  }

  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat;
      openId = null;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  render();
</script>
</body>
</html>
